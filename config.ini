[General]
;Test case sheet path
Casesheet path = .\testcases.xlsx
;Path to export result files (relative to execute.py)
Export folder = export

[Python]
;Optional path to append to the python path
Python path = 

[PSCAD]
;Volley size
Volley = 8
;Enable Animation (or Tracing) to allow Channel Plots and Runtime Signals being updated in the GUI while the simulation is running.
;This is very helpful for debugging but adds significant overhead to the simulation. Setting to False will disable the animation
;and speed up the simulation, but the Channel Plots and Runtime Signals will not be updated until the simulation is finished. 
Animation = False
;Fortran version when running PSCAD from the command line
Fortran version = Intel 19.2.49496 (64-bit)
;Workspace path when running PSCAD from the command line
Workspace = ..\Solbakke.pswx

[PowerFactory]
;PowerFactory parallel task automation. 
Parallel = True
;As per 2023 SP5 there is a bug in PF that causes QDSL blocks to be ignored in parallel simulations.
;PowerFactory temporary workaround: QDSL controller sometimes fails when not in same grid as calc. relevant statgens.
;The QDSL controller will be copied to the following grid. Disable by setting to empty string:
QDSL copy grid =
